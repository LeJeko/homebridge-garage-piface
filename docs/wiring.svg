<svg xmlns="http://www.w3.org/2000/svg" width="720" height="410" viewBox="0 0 720 410">

  <!-- Background -->
  <rect width="720" height="410" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#0f172a">
    PiFace Digital — Wiring Diagram
  </text>

  <!-- ── Raspberry Pi outer box ── -->
  <rect x="20" y="50" width="190" height="310" rx="10"
        fill="#be123c" stroke="#9f1239" stroke-width="2"/>
  <text x="115" y="73" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">
    Raspberry Pi
  </text>

  <!-- ── PiFace inner box ── -->
  <rect x="30" y="82" width="170" height="268" rx="7"
        fill="#1d4ed8" stroke="#1e3a8a" stroke-width="2"/>
  <text x="115" y="104" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">
    PiFace Digital
  </text>

  <!-- OUTPUTS section bar -->
  <rect x="38" y="114" width="154" height="17" rx="3" fill="#1e3a8a"/>
  <text x="115" y="126" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#93c5fd">
    OUTPUT (relay)
  </text>

  <!-- OUT 0 -->
  <text x="48" y="158" font-family="monospace" font-size="12" font-weight="700" fill="#86efac">OUT 0</text>
  <text x="48" y="172" font-family="system-ui,sans-serif" font-size="9" fill="#bfdbfe">relay — NO contact</text>

  <!-- INPUTS section bar -->
  <rect x="38" y="205" width="154" height="17" rx="3" fill="#1e3a8a"/>
  <text x="115" y="217" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#fdba74">
    INPUTS (sensors, optional)
  </text>

  <!-- IN 0 -->
  <text x="48" y="252" font-family="monospace" font-size="12" font-weight="700" fill="#fdba74">IN 0</text>
  <text x="48" y="266" font-family="system-ui,sans-serif" font-size="9" fill="#bfdbfe">pull-up input</text>

  <!-- IN 1 -->
  <text x="48" y="318" font-family="monospace" font-size="12" font-weight="700" fill="#fdba74">IN 1</text>
  <text x="48" y="332" font-family="system-ui,sans-serif" font-size="9" fill="#bfdbfe">pull-up input</text>

  <!-- Pin connector dots (right edge of PiFace, x=200) -->
  <circle cx="200" cy="160" r="6" fill="#22c55e" stroke="white" stroke-width="1.5"/>
  <circle cx="200" cy="255" r="6" fill="#f97316" stroke="white" stroke-width="1.5"/>
  <circle cx="200" cy="320" r="6" fill="#f97316" stroke="white" stroke-width="1.5"/>

  <!-- ── Device boxes ── -->

  <!-- Motor: center y=160 -->
  <rect x="490" y="130" width="210" height="60" rx="8"
        fill="#14532d" stroke="#166534" stroke-width="1.5"/>
  <text x="595" y="155" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white">Motor</text>
  <text x="595" y="174" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" fill="#86efac">COM + NO trigger terminals</text>

  <!-- Closed Sensor: center y=255 -->
  <rect x="490" y="225" width="210" height="60" rx="8"
        fill="#4c1d95" stroke="#5b21b6" stroke-width="1.5"/>
  <text x="595" y="250" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white">Closed Sensor</text>
  <text x="595" y="269" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" fill="#c4b5fd">magnetic contact (closed position)</text>

  <!-- Open Sensor: center y=320 -->
  <rect x="490" y="290" width="210" height="60" rx="8"
        fill="#4c1d95" stroke="#5b21b6" stroke-width="1.5"/>
  <text x="595" y="315" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white">Open Sensor</text>
  <text x="595" y="334" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" fill="#c4b5fd">magnetic contact (open position)</text>

  <!-- ── Connection wires ── -->

  <!-- OUT 0 → Motor (solid green) -->
  <line x1="200" y1="160" x2="490" y2="160" stroke="#22c55e" stroke-width="2.5"/>
  <text x="345" y="152" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" fill="#16a34a">switchOutput: 0</text>

  <!-- IN 0 → Closed Sensor (dashed orange) -->
  <line x1="200" y1="255" x2="490" y2="255"
        stroke="#f97316" stroke-width="2.5" stroke-dasharray="7,4"/>
  <text x="345" y="247" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" fill="#ea580c">closedSensorInput: 0</text>

  <!-- IN 1 → Open Sensor (dashed orange) -->
  <line x1="200" y1="320" x2="490" y2="320"
        stroke="#f97316" stroke-width="2.5" stroke-dasharray="7,4"/>
  <text x="345" y="312" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" fill="#ea580c">openSensorInput: 1</text>

  <!-- ── Legend ── -->
  <line x1="20" y1="372" x2="700" y2="372" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="30" y1="384" x2="65" y2="384" stroke="#22c55e" stroke-width="2.5"/>
  <text x="72" y="388" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Output — relay trigger (required)</text>
  <line x1="30" y1="398" x2="65" y2="398" stroke="#f97316" stroke-width="2.5" stroke-dasharray="7,4"/>
  <text x="72" y="402" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Input — sensor signal (optional)</text>

</svg>
